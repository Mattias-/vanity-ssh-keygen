name: go

on:
  push:
    branches:
      - "master"
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write # needed to write releases
  id-token: write # needed for keyless signing
  attestations: write # needed for provenance

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Debug GH
        env:
          REV_BEFORE: ${{ github.event.pull_request.base.sha || github.base_ref }}
          BEFORE_SHA: ${{ github.event.pull_request.base.sha || github.base_ref || github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: env

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Generate Readme
        run: make check-readme

      - name: Smoke Test
        # Run smoke test to ensure the binary works as expected.
        timeout-minutes: 1
        run: make smoke-test

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: "v2.11"

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        if: success() && startsWith(github.ref, 'refs/tags/v')
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@main
        if: success() && startsWith(github.ref, 'refs/tags/v')

      - name: Release
        uses: goreleaser/goreleaser-action@v7
        if: success() && startsWith(github.ref, 'refs/tags/v')
        with:
          version: "v2.15.2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KO_DOCKER_REPO: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/vanity-ssh-keygen

      - uses: actions/attest@v4
        if: success() && startsWith(github.ref, 'refs/tags/v')
        with:
          subject-checksums: ./dist/checksums.txt
